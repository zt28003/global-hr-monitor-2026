.section-body{padding:20px 24px}
.filter-bar{display:flex;align-items:center;gap:12px;padding:14px 20px;margin-bottom:16px;background:rgba(30,60,100,.3);border-radius:10px;border:1px solid rgba(100,150,255,.1)}
.filter-bar label{font-size:14px;color:#90b4d4;white-space:nowrap}
.filter-bar select{background:rgba(20,40,70,.8);color:#e0e8f0;border:1px solid rgba(100,150,255,.3);border-radius:8px;padding:8px 14px;font-size:14px;cursor:pointer;outline:none;min-width:200px}

.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:16px;margin-bottom:20px}

.kpi-label{font-size:13px;color:#7eb8e0;margin-bottom:10px}

.dept-toggle:hover{background:rgba(30,60,100,.5);color:#b0d0f0}
.dept-toggle .arr{transition:transform .3s;font-size:12px}

.dept-grid.open{display:block}
.dept-row{display:grid;grid-template-columns:180px repeat(6,1fr);gap:10px;padding:10px 12px;align-items:center;border-bottom:1px solid rgba(100,150,255,.05);font-size:14px;transition:background .2s}

.dept-v{text-align:center}

.chart-box h3{font-size:15px;color:#90b4d4;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(100,150,255,.08)}

function renderKPI(d){
d=d||D.total;
const g=document.getElementById('kpiGrid');
const items=[
{l:'26年初人数',v:N(d.start),s:'1月1日在职'},
{l:'26年入职人数',v:N(d.hire),s:'截至4月30日'},
{l:'26年离职人数',v:N(d.leave),s:'截至4月30日'},
{l:'26年净增人数',v:(d.net>=0?'+':'')+N(d.net),s:'入职-离职-调出'},
{l:'期末在职人数',v:N(d.end),s:'截至4月30日'},
{l:'离职率',v:R(d.turnover_rate),s:'离职人数/(年初+入职)',red:false}
];
g.innerHTML=items.map(i=>'<div class="kpi-card"><div class="kpi-label">'+i.l+'</div><div class="kpi-value"'+(i.red?' style="background:none;-webkit-text-fill-color:#ef5350"':'')+'>'+i.v+'</div><div class="kpi-sub">'+i.s+'</div></div>').join('');
}

function renderDeptRows(){
const c=document.getElementById('deptRows');
const maxRate=Math.max(...D.departments.filter(d=>d.summary).map(d=>d.summary.turnover_rate));
let h='';
D.departments.forEach(d=>{
const s=d.summary;if(!s)return;
const isMax=Math.abs(s.turnover_rate-maxRate)<0.001;
h+='<div class="dept-row"><div class="dept-nm">'+d.name+'</div><div class="dept-v">'+N(s.start)+'</div><div class="dept-v">'+N(s.hire)+'</div><div class="dept-v">'+N(s.leave)+'</div><div class="dept-v">'+(s.net>=0?'+':'')+N(s.net)+'</div><div class="dept-v">'+N(s.end)+'</div><div class="dept-v'+(isMax?' rh':'')+'">'+R(s.turnover_rate)+'</div></div>';
});
c.innerHTML=h;
}

function toggleDeptKpi(){
const t=document.getElementById('deptToggle'),g=document.getElementById('deptGrid');
t.classList.toggle('open');g.classList.toggle('open');

function getData(name){return name==='total'?D.total:(D.departments.find(d=>d.name===name)||{}).summary||D.total;}
function getLabel(name){return name==='total'?'集团':name;}

function mkChart(id,type,labels,values,colors){
const ctx=document.getElementById(id).getContext('2d');
if(CH[id])CH[id].destroy();
CH[id]=new Chart(ctx,{
type,data:{labels,datasets:[{data:values,backgroundColor:colors,borderColor:'rgba(0,0,0,.1)',borderWidth:2,hoverOffset:8}]},
options:{responsive:true,maintainAspectRatio:false,cutout:'40%',plugins:{legend:{position:'right',labels:{color:'#90b4d4',font:{size:12},padding:12,usePointStyle:true}},tooltip:{callbacks:{label:function(c){const t=c.dataset.data.reduce((a,b)=>a+b,0);const p=t>0?Math.round(c.parsed/t*100):0;return c.label+': '+c.parsed+'人 ('+p+'%)'}}},datalabels:{color:'#fff',font:{size:11,weight:'bold'},textAlign:'center',formatter:function(v,ctx){const t=ctx.dataset.data.reduce((a,b)=>a+b,0);const p=t>0?Math.round(v/t*100):0;return v+'人\n('+p+'%)';},display:function(ctx){return ctx.dataset.data[ctx.dataIndex]>0;}}}},animation:{animateRotate:true,duration:800},plugins:[ChartDataLabels]});
}

function mkBar(id,labels,values,pcts,colors){
const ctx=document.getElementById(id).getContext('2d');
if(CH[id])CH[id].destroy();
const combined=labels.map((l,i)=>({l,v:values[i],p:pcts[i],c:colors[i]})).sort((a,b)=>b.v-a.v);
const sLabels=combined.map(x=>x.l),sValues=combined.map(x=>x.v),sPcts=combined.map(x=>x.p),sColors=combined.map(x=>x.c);
CH[id]=new Chart(ctx,{
type:'bar',data:{labels:sLabels,datasets:[{label:'人数',data:sValues,backgroundColor:sColors.map(c=>c+'cc'),borderColor:sColors,borderWidth:1,borderRadius:4}]},
options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',layout:{padding:{right:80}},plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.parsed.x+'人 ('+Math.round(sPcts[c.dataIndex]||0)+'%)'}}}},scales:{x:{grid:{color:'rgba(100,150,255,.08)'},ticks:{color:'#7eb8e0'}},y:{grid:{display:false},ticks:{color:'#90b4d4',font:{size:12}}}},animation:{duration:800}},
plugins:[{afterDatasetsDraw:function(chart){
const ctx2=chart.ctx;
chart.data.datasets[0].data.forEach((val,i)=>{
const meta=chart.getDatasetMeta(0);const bar=meta.data[i];
ctx2.fillStyle='#b0d0f0';ctx2.font='12px sans-serif';ctx2.textAlign='left';ctx2.textBaseline='middle';
ctx2.fillText(val+'人 ('+Math.round(sPcts[i]||0)+'%)',bar.x+6,bar.y);
});
}}]
});
}

function updateCharts(name){
const d=getData(name),lb=getLabel(name);

mkChart('c1','doughnut',['高绩效','中绩效','低绩效','无绩效'],[d.perf_high,d.perf_mid,d.perf_low,d.perf_none],C.perf);

mkChart('c2','doughnut',['高潜型','稳健型','跟随型','无盘点结果'],[d.talent_high,d.talent_stable,d.talent_follow,d.talent_none],C.talent);

});

function rc(r){return r>=20?'rh':r>=10?'rm':'rl';}

function renderTable(flt){
const tb=document.getElementById('tblBody');
const depts=flt==='all'?D.departments:D.departments.filter(d=>d.name===flt);
const maxDept2Rate=Math.max(...D.departments.filter(d=>d.summary).map(d=>d.summary.turnover_rate));
let h='';
D.departments.forEach(dept=>{
if(flt!=='all'&&dept.name!==flt)return;
const s=dept.summary;if(!s)return;
const has=dept.subs&&dept.subs.length>0;
const cid='_'+dept.name.replace(/[^a-zA-Z0-9]/g,'_');
const isMaxDept=Math.abs(s.turnover_rate-maxDept2Rate)<0.001;
h+='<tr class="sum-r"><td>';
if(has)h+='<button class="toggle-btn" id="b'+cid+'" onclick="toggleSubs(\''+dept.name+'\')"><span class="arr">&#9654;</span> '+dept.name+'</button>';
else h+='<span style="font-weight:600;color:#64b5f6">'+dept.name+'</span>';
h+='</td><td>'+N(s.start)+'</td><td>'+N(s.hire)+'</td><td>'+N(s.leave)+'</td><td>'+(s.net>=0?'+':'')+N(s.net)+'</td><td>'+N(s.end)+'</td><td'+(isMaxDept?' class="rh"':'')+'>'+R(s.turnover_rate)+'</td></tr>';
if(has){
dept.subs.forEach(sub=>{
h+='<tr class="sub-r s'+cid+'"><td>'+sub.dept3+'</td><td>'+N(sub.start)+'</td><td>'+N(sub.hire)+'</td><td>'+N(sub.leave)+'</td><td>'+(sub.net>=0?'+':'')+N(sub.net)+'</td><td>'+N(sub.end)+'</td><td>'+R(sub.turnover_rate)+'</td></tr>';
});
}
});
tb.innerHTML=h;
}

function toggleSubs(name){
const cid='_'+name.replace(/[^a-zA-Z0-9]/g,'_');
const rows=document.querySelectorAll('.s'+cid);
const btn=document.getElementById('b'+cid);
const open=btn.classList.contains('open');
rows.forEach(r=>{if(open)r.classList.remove('show');else r.classList.add('show');});
btn.classList.toggle('open');
}

};
let crossDim='perf',crossCH=null;

function getDeptShortName(name){
const m={'LBU速运事业部':'LBU','FBU仓储事业部':'FBU','ABU航空事业部':'ABU','PBU口岸事业部':'PBU','GEU':'GEU','GUS':'GUS','HRAS人力综合条线':'HRAS','FES财经条线':'FES','HQU技术部':'HQU','B.PRD品牌公关部':'B.PRD','投资部':'投资部','PO总裁办':'PO'};
return m[name]||name;
}

function renderCrossChart(){
const cfg=CROSS_DIM[crossDim];
const dcfg=CROSS_DIM[crossDim];
document.getElementById('dimInfo').textContent=dcfg.desc;

const depts=D.departments.filter(d=>d.summary&&d.summary.leave>0).map(d=>d.summary);
if(depts.length===0)return;

const deptNames=depts.map(d=>D.departments.find(dd=>dd.summary===d).name);
const vals=depts.map(d=>cfg.getVals(d));
const cnts=cfg.getCnts?depts.map(d=>cfg.getCnts(d)):vals.map(v=>v.map(()=>0));
const cats=cfg.cats,colors=cfg.cols;

const datasets=cats.map((cat,i)=>({
label:cat,data:vals.map(v=>v[i]||0),
backgroundColor:colors[i]+'cc',borderColor:colors[i],borderWidth:1,
maxBarThickness:26
}));

const nCats=cats.length;
const labelFont=nCats<=3?'12px sans-serif':nCats<=5?'11px sans-serif':'10px sans-serif';
document.querySelector('.cross-chart-wrap').style.height='500px';

const ctx=document.getElementById('crossChart').getContext('2d');
if(crossCH)crossCH.destroy();

crossCH=new Chart(ctx,{
type:'bar',data:{labels:deptNames,datasets},
options:{
responsive:true,maintainAspectRatio:false,
layout:{padding:{top:30}},
plugins:{
legend:{position:'top',labels:{color:'#90b4d4',font:{size:11},padding:12,usePointStyle:true,boxWidth:10}},
tooltip:{callbacks:{label:function(c){return c.dataset.label+': '+cnts[c.dataIndex][c.datasetIndex]+'人('+c.formattedValue+'%)';}}}
},
scales:{
x:{grid:{display:false},ticks:{color:'#90b4d4',font:{size:11},autoSkip:false,maxRotation:25,minRotation:0}},
y:{grid:{color:'rgba(100,150,255,.08)'},ticks:{color:'#7eb8e0',callback:function(v){return v+'%'}},max:100,title:{display:true,text:'比例(%)',color:'#7eb8e0'}}
},
interaction:{mode:'index',intersect:false},
animation:{duration:500}
},
plugins:[{
id:'crossLabels',
afterDatasetsDraw:function(chart){
const ctx2=chart.ctx;
chart.data.datasets.forEach((ds,dsIdx)=>{
const meta=chart.getDatasetMeta(dsIdx);
if(!meta||!meta.data)return;
meta.data.forEach((bar,i)=>{
const v=ds.data[i];
if(v===undefined||v===null||v<=0)return;
const count=cnts[i]?cnts[i][dsIdx]:0;
ctx2.save();
ctx2.fillStyle='#b0d0f0';
ctx2.font=labelFont;
ctx2.textAlign='center';
ctx2.textBaseline='bottom';
ctx2.fillText(count+'人 ('+Math.round(v)+'%)',bar.x,bar.y-5);
ctx2.restore();
});
});
}
}]
});
}

function switchCrossDim(dim){
crossDim=dim;
document.querySelectorAll('#dimBtns .dim-btn').forEach(b=>b.classList.toggle('active',b.dataset.dim===dim));
renderCrossChart();
}

document.getElementById('dimBtns').addEventListener('click',function(e){
if(e.target.classList.contains('dim-btn'))switchCrossDim(e.target.dataset.dim);
});

renderKPI();initFilters();updateCharts('total');renderTable('all');
renderCrossChart();
</script>
</body>
